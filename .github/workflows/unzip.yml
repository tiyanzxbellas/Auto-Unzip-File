name: Auto Unzip File

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Unzip semua file
        run: |
          find . -name "*.zip" -type f | while read zip_file; do
            echo "Mengekstrak $zip_file ..."
            dir=$(dirname "$zip_file")
            unzip -o "$zip_file" -d "$dir"
            rm "$zip_file"
          done

      - name: Commit dan push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto extract ZIP [skip ci]"
          git diff --staged --quiet || git push origin main
